<svg width="480" height="120" viewBox="0 0 480 120" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="hexGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3B82F6" />
      <stop offset="100%" stop-color="#1E3A8A" />
    </linearGradient>
    <linearGradient id="dbGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#F8FAFC" />
      <stop offset="50%" stop-color="#CBD5E1" />
      <stop offset="100%" stop-color="#94A3B8" />
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <filter id="sparkleGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- ===== Icon (scaled to fit ~100×100, offset 10,10) ===== -->
  <g transform="translate(10, 10) scale(0.5)">
    <!-- Outer Hexagon -->
    <polygon
      points="100,12 176,56 176,144 100,188 24,144 24,56"
      fill="none"
      stroke="url(#hexGrad)"
      stroke-width="10"
      stroke-linejoin="round"
    />
    <!-- Inner Hexagon -->
    <polygon
      points="100,32 158,66 158,134 100,168 42,134 42,66"
      fill="none"
      stroke="rgba(59,130,246,0.25)"
      stroke-width="3"
      stroke-linejoin="round"
    />

    <!-- Dumbbell — silver/white -->
    <g transform="rotate(-30, 100, 100)" filter="url(#glow)">
      <rect x="38" y="82" width="8" height="36" rx="3" fill="url(#dbGrad)" />
      <rect x="50" y="72" width="10" height="56" rx="3" fill="url(#dbGrad)" />
      <rect x="60" y="94" width="80" height="12" rx="6" fill="url(#dbGrad)" />
      <rect x="140" y="72" width="10" height="56" rx="3" fill="url(#dbGrad)" />
      <rect x="154" y="82" width="8" height="36" rx="3" fill="url(#dbGrad)" />
    </g>

    <!-- ✨ AI Sparkles — radiating from dumbbell ends -->
    <g transform="translate(148, 58)" filter="url(#sparkleGlow)">
      <path d="M0,-18 L3.5,-3.5 L18,0 L3.5,3.5 L0,18 L-3.5,3.5 L-18,0 L-3.5,-3.5 Z" fill="#60A5FA" />
    </g>
    <g transform="translate(55, 140)" filter="url(#sparkleGlow)">
      <path d="M0,-13 L2.5,-2.5 L13,0 L2.5,2.5 L0,13 L-2.5,2.5 L-13,0 L-2.5,-2.5 Z" fill="#93BBFD" />
    </g>
    <g transform="translate(135, 105)" filter="url(#sparkleGlow)">
      <path d="M0,-10 L2,-2 L10,0 L2,2 L0,10 L-2,2 L-10,0 L-2,-2 Z" fill="#BFDBFE" opacity="0.9" />
    </g>
  </g>

  <!-- ===== Text ===== -->
  <text x="130" y="80" font-family="'Fira Sans', 'Helvetica Neue', Arial, sans-serif" font-weight="700" font-size="56" fill="#F1F5F9" letter-spacing="-1">
    FitSense<tspan fill="#4d8eff"> AI</tspan>
  </text>

  <!-- Sparkle accent near "AI" text -->
  <g transform="translate(438, 38)" filter="url(#sparkleGlow)">
    <path d="M0,-7 L1.2,-1.2 L7,0 L1.2,1.2 L0,7 L-1.2,1.2 L-7,0 L-1.2,-1.2 Z" fill="#60A5FA" opacity="0.9" />
  </g>
</svg>
